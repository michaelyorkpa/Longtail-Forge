<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home | Time Tracker</title>
    <link rel="stylesheet" href="styles/time-tracker.css">
  </head>
  <body data-page-title="Home">
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary">
        <a class="site-brand" href="home.html" data-organization-name>Organization</a>
        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="primary-menu"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links" id="primary-menu">
          <a href="home.html" aria-current="page">Home</a>
          <details class="nav-menu">
            <summary>Time Keeping</summary>
            <div class="nav-menu-links">
              <a href="index.html">Time Tracker</a>
              <a href="manual-entry.html">Create Manual Entry</a>
              <a href="edit-entries.html">Edit Entries</a>
            </div>
          </details>
          <a href="reporting.html">Reporting</a>
          <details class="nav-menu">
            <summary>Settings</summary>
            <div class="nav-menu-links">
              <a href="clients-projects.html">Projects &amp; Clients</a>
              <a href="app-settings.html">App Settings</a>
            </div>
          </details>
        </div>
      </nav>
    </header>

    <main class="home-page">
      <h1>Home</h1>

      <section class="home-summary-grid" aria-label="Dashboard summary">
        <article class="dashboard-panel active-client-panel">
          <details class="home-client-details">
            <summary>
              <span>Active Clients</span>
              <span class="metric-value" data-active-client-count>0</span>
            </summary>
            <fieldset class="client-radio-list" data-client-report-options>
              <legend>Client Reporting</legend>
            </fieldset>
            <button type="button" data-open-client-report disabled>Open Reporting</button>
          </details>
        </article>
      </section>

      <section class="dashboard-panel">
        <h2>Current Month Billables</h2>
        <p data-home-status role="status" aria-live="polite"></p>
        <div class="report-table-wrap">
          <table class="report-table">
            <thead>
              <tr>
                <th scope="col">Client</th>
                <th scope="col">Hours</th>
                <th scope="col">Billable Amount</th>
              </tr>
            </thead>
            <tbody data-current-month-billables></tbody>
            <tfoot>
              <tr>
                <th scope="row">Totals</th>
                <td data-current-month-hours></td>
                <td data-current-month-amount></td>
              </tr>
            </tfoot>
          </table>
        </div>
      </section>

      <section class="dashboard-panel">
        <h2>Billables by Month</h2>
        <div class="billables-chart" data-billables-chart aria-label="Previous 12 months and current month billables"></div>
      </section>
    </main>

    <script src="navigation.js"></script>
    <script src="home.js"></script>
  </body>
</html>
