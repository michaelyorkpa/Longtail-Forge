<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Entries | Time Tracker</title>
    <link rel="stylesheet" href="styles/time-tracker.css">
  </head>
  <body data-page-title="Edit Entries">
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary">
        <a class="site-brand" href="home.html" data-organization-name>Organization</a>
        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="primary-menu"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links" id="primary-menu">
          <a href="home.html">Home</a>
          <details class="nav-menu">
            <summary>Time Keeping</summary>
            <div class="nav-menu-links">
              <a href="index.html">Time Tracker</a>
              <a href="manual-entry.html">Create Manual Entry</a>
              <a href="edit-entries.html" aria-current="page">Edit Entries</a>
            </div>
          </details>
          <a href="reporting.html">Reporting</a>
          <details class="nav-menu">
            <summary>Settings</summary>
            <div class="nav-menu-links">
              <a href="clients-projects.html">Projects &amp; Clients</a>
              <a href="app-settings.html">App Settings</a>
            </div>
          </details>
        </div>
      </nav>
    </header>

    <main class="entry-page">
      <h1>Edit Entries</h1>

      <section class="entry-filters" aria-label="Entry filters">
        <label>
          Client
          <select data-edit-filter-client>
            <option value="">All clients</option>
          </select>
        </label>

        <label>
          Project
          <select data-edit-filter-project disabled>
            <option value="">All projects</option>
          </select>
        </label>
      </section>

      <p data-edit-entry-status role="status" aria-live="polite"></p>

      <div class="report-table-wrap">
        <table class="report-table">
          <thead>
            <tr>
              <th scope="col">Date</th>
              <th scope="col">Client</th>
              <th scope="col">Project</th>
              <th scope="col">Duration</th>
              <th scope="col">Status</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody data-edit-entry-table></tbody>
        </table>
      </div>

      <form class="entry-form entry-edit-form" data-edit-entry-form hidden>
        <h2 data-edit-entry-heading>Edit Entry</h2>

        <label>
          Client
          <select data-edit-entry-client required></select>
        </label>

        <label>
          Project
          <select data-edit-entry-project required></select>
        </label>

        <label>
          Date
          <input type="date" data-edit-entry-date required>
        </label>

        <label>
          Start Time
          <input type="time" data-edit-entry-start-time required>
        </label>

        <label>
          End Time
          <input type="time" data-edit-entry-end-time required>
        </label>

        <label class="entry-description">
          Description
          <textarea data-edit-entry-description rows="4"></textarea>
        </label>

        <label>
          Billable
          <select data-edit-entry-billable>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </label>

        <label>
          Invoice Status
          <select data-edit-entry-invoice-status>
            <option value="unbilled">Unbilled</option>
            <option value="billed">Billed</option>
            <option value="paid">Paid</option>
          </select>
        </label>

        <div class="form-actions entry-actions">
          <button type="button" data-cancel-edit-entry>Cancel</button>
          <button type="submit" data-save-edit-entry>Save Changes</button>
        </div>
      </form>
    </main>

    <script src="navigation.js"></script>
    <script src="edit-entries.js"></script>
  </body>
</html>
