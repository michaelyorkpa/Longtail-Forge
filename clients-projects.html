<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projects &amp; Clients | Time Tracker</title>
    <link rel="stylesheet" href="styles/time-tracker.css">
  </head>
  <body data-page-title="Projects &amp; Clients">
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary">
        <a class="site-brand" href="home.html" data-organization-name>Organization</a>
        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="primary-menu"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links" id="primary-menu">
          <a href="home.html">Home</a>
          <details class="nav-menu">
            <summary>Time Keeping</summary>
            <div class="nav-menu-links">
              <a href="index.html">Time Tracker</a>
              <a href="manual-entry.html">Create Manual Entry</a>
              <a href="edit-entries.html">Edit Entries</a>
            </div>
          </details>
          <a href="reporting.html">Reporting</a>
          <details class="nav-menu">
            <summary>Settings</summary>
            <div class="nav-menu-links">
              <a href="clients-projects.html" aria-current="page">Projects &amp; Clients</a>
              <a href="app-settings.html">App Settings</a>
            </div>
          </details>
        </div>
      </nav>
    </header>

    <main class="wide-page">
      <div class="page-heading">
        <h1>Projects &amp; Clients</h1>
        <button type="button" data-add-client>Add Client</button>
      </div>

      <div class="client-filters">
        <label>
          Client Status
          <select data-client-status-filter>
            <option value="Active" selected>Active</option>
            <option value="Inactive">Inactive</option>
            <option value="All">All</option>
          </select>
        </label>
      </div>

      <p data-client-project-status role="status" aria-live="polite"></p>
      <section class="client-list" data-client-list aria-label="Clients and projects"></section>

      <dialog data-client-modal>
        <form method="dialog" data-client-form>
          <h2>Add Client</h2>

          <label>
            Client Name
            <input type="text" data-new-client-name required>
          </label>

          <label>
            First Project Name
            <input type="text" data-new-project-name required>
          </label>

          <label>
            First Project Billing Rate ($/hour)
            <input type="text" inputmode="decimal" data-new-project-billing-rate>
          </label>

          <label>
            First Project Status
            <select data-new-project-status>
              <option>Active</option>
              <option>Inactive</option>
              <option>Completed</option>
            </select>
          </label>

          <div class="form-actions">
            <button type="button" data-cancel-client>Cancel</button>
            <button type="submit">Save</button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="navigation.js"></script>
    <script src="clients-projects.js"></script>
  </body>
</html>
