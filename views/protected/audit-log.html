<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audit Log | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=7">
  </head>
  <body data-page-title="Audit Log">
    <main class="audit-log-page">
      <h1>Audit Log</h1>

      <form class="audit-log-filters" data-audit-filters>
        <label>
          From
          <input type="date" data-audit-date-from>
        </label>

        <label>
          To
          <input type="date" data-audit-date-to>
        </label>

        <label>
          User
          <select data-audit-user-filter>
            <option value="">All users</option>
          </select>
        </label>

        <label>
          Record Type
          <select data-audit-record-type-filter>
            <option value="">All record types</option>
          </select>
        </label>

        <label>
          Change Type
          <select data-audit-change-type-filter>
            <option value="">All change types</option>
          </select>
        </label>

        <label data-audit-workspace-filter-control hidden>
          Workspace
          <select data-audit-workspace-filter>
            <option value="">Current workspace</option>
          </select>
        </label>

        <div class="audit-log-actions">
          <label class="inline-option audit-timezone-control">
            <input type="checkbox" data-audit-show-utc>
            Show UTC
          </label>
          <button type="submit">Apply</button>
          <button type="button" data-audit-reset>Reset</button>
          <button type="button" data-audit-export-filtered>Export Filtered</button>
          <button type="button" data-audit-export-all>Export All</button>
          <label class="audit-page-size-control">
            Rows
            <select data-audit-page-size>
              <option value="25">25</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
              <option value="250">250</option>
              <option value="500">500</option>
            </select>
          </label>
        </div>
      </form>

      <p data-audit-status role="status" aria-live="polite"></p>

      <div class="report-table-wrap">
        <table class="report-table audit-log-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>User</th>
              <th>Client</th>
              <th>Project</th>
              <th>Record Type</th>
              <th>Change Type</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody data-audit-log-body></tbody>
        </table>
      </div>

      <nav class="audit-pagination" aria-label="Audit log pages">
        <button type="button" data-audit-previous-page>Previous</button>
        <span data-audit-page-summary>Page 1 of 1</span>
        <button type="button" data-audit-next-page>Next</button>
      </nav>
    </main>

    <script src="js/shared/api-client.js"></script>
    <script src="js/shared/timezones.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/audit-log.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
