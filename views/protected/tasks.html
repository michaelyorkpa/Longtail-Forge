<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tasks | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=11">
  </head>
  <body data-page-title="Tasks">
    <main class="wide-page tasks-page">
      <div class="page-heading">
        <h1>Tasks</h1>
        <button type="button" data-add-task>Add Task</button>
      </div>

      <div class="task-page-toolbar task-sticky-controls">
        <h2>Filter List</h2>
        <div class="task-quick-filters" data-task-quick-filters>
          <button type="button" data-task-quick-filter="my">My Tasks</button>
          <button type="button" data-task-quick-filter="all">All</button>
          <button type="button" data-task-quick-filter="unassigned">Unassigned</button>
          <button type="button" data-task-quick-filter="overdue">Overdue</button>
          <button type="button" data-task-quick-filter="today">Due Today</button>
          <button type="button" data-task-quick-filter="week">Due This Week</button>
          <button type="button" data-task-quick-filter="complete">Completed</button>
          <button type="button" data-task-quick-filter="archived">Archived</button>
        </div>
        <details class="task-filter-details" data-task-filter-details>
          <summary>Sorting and Filters</summary>
          <div class="task-filter-grid">
            <label>
              Sort
              <select data-task-sort>
                <option value="due_asc" selected>Due Date</option>
                <option value="priority_desc">Priority</option>
                <option value="status_asc">Status</option>
                <option value="last_worked">Last Worked</option>
                <option value="context">Project / Client</option>
                <option value="newest">Newest</option>
                <option value="oldest">Oldest</option>
              </select>
            </label>
            <label>
              Status
              <select data-task-status-filter>
                <option value="active" selected>Active</option>
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="blocked">Blocked</option>
                <option value="complete">Complete</option>
                <option value="archived">Archived</option>
                <option value="all">All</option>
              </select>
            </label>
            <label>
              Assignee
              <select data-task-assignee-filter>
                <option value="all" selected>All assignees</option>
              </select>
            </label>
            <label data-client-workspace-control>
              Client
              <select data-task-client-filter>
                <option value="all" selected>All clients</option>
              </select>
            </label>
            <label>
              Project
              <select data-task-project-filter>
                <option value="all" selected>All projects</option>
              </select>
            </label>
            <label data-task-tag-filter-control hidden>
              Tag
              <select data-task-tag-filter>
                <option value="all" selected>All tags</option>
              </select>
            </label>
          </div>
        </details>
      </div>

      <details class="task-bulk-toolbar" data-task-bulk-toolbar>
        <summary>Bulk Actions</summary>
        <div class="task-bulk-grid">
          <label data-task-bulk-status-control>
            Status
            <select data-task-bulk-status>
              <option value="" selected>-</option>
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="blocked">Blocked</option>
              <option value="complete">Complete</option>
            </select>
          </label>
          <label data-task-bulk-priority-control>
            Priority
            <select data-task-bulk-priority>
              <option value="" selected>-</option>
              <option value="low">Low</option>
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </label>
          <label data-task-bulk-assignee-control>
            Assignees
            <div class="task-bulk-assignee-list" data-task-bulk-assignees></div>
          </label>
          <label data-task-bulk-tag-action-control hidden>
            Tag Action
            <select data-task-bulk-tag-action>
              <option value="" selected>-</option>
              <option value="tag_add">Add tags</option>
              <option value="tag_remove">Remove tags</option>
              <option value="tag_replace">Replace direct tags</option>
            </select>
          </label>
          <label data-task-bulk-tags-control hidden>
            Tags
            <select data-task-bulk-tags multiple size="4"></select>
          </label>
          <button type="button" data-task-bulk-apply disabled>Apply to 0</button>
        </div>
      </details>

      <p data-task-status role="status" aria-live="polite"></p>

      <div class="list-table-wrap">
        <table class="list-table task-table">
          <thead>
            <tr>
              <th><input type="checkbox" data-task-select-all aria-label="Select all visible tasks"></th>
              <th colspan="6">Task Details</th>
            </tr>
          </thead>
          <tbody data-task-list></tbody>
        </table>
      </div>

      <dialog class="task-detail-dialog" data-task-dialog>
        <form method="dialog" class="task-form" data-task-form>
          <h2 data-task-dialog-title>Task</h2>

          <label class="task-title-field">
            Title
            <input type="text" data-task-title required>
          </label>

          <label>
            Status
            <select data-task-form-status>
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="blocked">Blocked</option>
              <option value="complete">Complete</option>
              <option value="archived">Archived</option>
            </select>
          </label>

          <label>
            Priority
            <select data-task-priority>
              <option value="low">Low</option>
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="urgent">Urgent</option>
            </select>
          </label>

          <label data-client-workspace-control>
            Client
            <select data-task-client></select>
          </label>

          <label>
            Project
            <select data-task-project></select>
          </label>

          <label>
            Due Date
            <input type="date" data-task-due-date>
          </label>

          <label>
            Due Time
            <input type="time" data-task-due-time>
          </label>

          <label class="task-next-action-field">
            Next action
            <input type="text" maxlength="240" data-task-next-action placeholder="Send draft invoice to CTU.">
          </label>

          <label class="task-blocked-reason-field" data-task-blocked-reason-field hidden>
            Blocked reason
            <textarea rows="3" data-task-blocked-reason></textarea>
          </label>

          <label class="task-resume-note-field">
            Resume note
            <textarea rows="3" data-task-resume-note placeholder="Where did you leave off?"></textarea>
          </label>

          <div class="task-completion-field" data-task-completion-field hidden>
            <span>Time to completion</span>
            <strong data-task-completion-time></strong>
          </div>

          <fieldset class="task-checklist-field" data-task-checklist-field>
            <legend>Checklist</legend>
            <p data-task-checklist-status>0 / 0 complete</p>
            <div class="task-checklist-add-row">
              <input type="text" maxlength="240" data-task-checklist-input aria-label="Checklist item" placeholder="Add checklist item">
              <button type="button" data-task-checklist-add>Add</button>
            </div>
            <div class="task-checklist-list" data-task-checklist-list></div>
          </fieldset>

          <label class="task-assignee-field">
            Assignees
            <select multiple data-task-assignees></select>
          </label>

          <details class="task-recurrence-field" data-task-recurrence-panel>
            <summary>Recurrence</summary>
            <div class="task-recurrence-controls">
              <label class="inline-option">
                <input type="checkbox" data-task-recurring>
                Recurring?
              </label>
              <button type="button" data-task-recurrence-details disabled>Details</button>
            </div>
            <p data-task-recurrence-summary>Not recurring.</p>
          </details>

          <fieldset class="task-timer-field" data-task-timer-field hidden>
            <legend>Task Timer</legend>
            <p data-task-timer-status>No active timer.</p>
            <div class="task-timer-controls">
              <strong data-task-timer-display>00:00:00</strong>
              <button type="button" data-task-timer-start>Start</button>
              <button type="button" data-task-timer-pause disabled>Pause</button>
              <button type="button" data-task-timer-finalize disabled>Save Time</button>
              <button type="button" data-task-timer-reset disabled>Reset</button>
            </div>
          </fieldset>

          <details class="task-reminder-field" data-task-reminder-details>
            <summary>Reminders</summary>
            <p data-task-effective-reminders></p>
            <label class="inline-option">
              <input type="checkbox" data-task-reminder-override>
              Override reminder defaults
            </label>
            <div class="reminder-offset-grid" data-task-reminder-override-fields hidden>
              <label>
                Timed Reminder 1 (hours before)
                <input type="number" min="1" step="1" data-task-reminder-date-time-hours-1>
              </label>
              <label>
                Timed Reminder 2 (hours before)
                <input type="number" min="1" step="1" data-task-reminder-date-time-hours-2>
              </label>
              <label>
                Date-Only Reminder 1 (days before)
                <input type="number" min="1" step="1" data-task-reminder-date-only-days-1>
              </label>
              <label>
                Date-Only Reminder 2 (days before)
                <input type="number" min="1" step="1" data-task-reminder-date-only-days-2>
              </label>
            </div>
          </details>

          <div class="task-tags-field" data-task-tags></div>

          <div class="task-files-field" data-task-files></div>

          <details class="task-notes-field" data-task-notes-panel>
            <summary>Notes</summary>
            <div data-task-notes></div>
          </details>

          <fieldset class="task-notification-field" data-task-notification-field hidden>
            <legend>Notifications</legend>
            <p data-task-notification-status>Follow this task to receive update notifications for yourself.</p>
            <button type="button" data-task-notification-follow>Follow Notifications</button>
          </fieldset>

          <label class="task-description-field">
            Description
            <textarea rows="5" data-task-description></textarea>
          </label>

          <div class="form-actions task-modal-actions">
            <button type="button" data-copy-task-link hidden>Copy Link</button>
            <button type="button" data-cancel-task>Cancel</button>
            <button type="submit" data-save-task>Save Task</button>
          </div>
        </form>
      </dialog>

      <dialog class="task-recurrence-dialog" data-task-recurrence-dialog>
        <form method="dialog" class="task-recurrence-form" data-task-recurrence-form>
          <h2>Recurrence</h2>

          <label>
            Frequency
            <select data-task-recurrence-frequency>
              <option value="DAILY">Daily</option>
              <option value="WEEKDAYS">Weekdays</option>
              <option value="WEEKENDS">Weekends</option>
              <option value="WEEKLY" selected>Weekly</option>
              <option value="MONTHLY">Monthly</option>
            </select>
          </label>

          <label>
            Every
            <input type="number" min="1" step="1" value="1" data-task-recurrence-interval>
          </label>

          <label>
            End Date
            <input type="date" data-task-recurrence-end-date>
          </label>

          <div class="form-actions task-modal-actions">
            <button type="button" data-task-recurrence-cancel>Cancel</button>
            <button type="submit">Save Recurrence</button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/shared/modal.js"></script>
    <script src="js/shared/api-client.js"></script>
    <script src="js/shared/page-controller.js"></script>
    <script src="js/shared/module-actions.js?v=1"></script>
    <script src="js/shared/icons.js?v=1"></script>
    <script src="js/shared/notification-subscriptions.js?v=1"></script>
    <script src="js/shared/timezones.js"></script>
    <script src="js/shared/tags.js"></script>
    <script src="js/shared/file-attachments.js"></script>
    <script src="js/shared/notes-linked-panel.js?v=1"></script>
    <script src="js/task-dialog.js?v=3"></script>
    <script src="js/tasks.js?v=6"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
