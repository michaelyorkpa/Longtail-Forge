<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lists | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=20">
  </head>
  <body data-page-title="Lists">
    <main class="wide-page lists-page">
      <div class="page-heading">
        <h1 data-lists-title>Lists</h1>
        <button type="button" data-list-create>Create List</button>
      </div>

      <p data-lists-status role="status" aria-live="polite"></p>

      <details class="lists-filters-panel" data-lists-filters-panel>
        <summary>Filters</summary>
        <form class="lists-filters" data-lists-filters>
          <label>
            Status
            <select data-list-filter-status>
              <option value="active" selected>Active</option>
              <option value="completed">Completed</option>
              <option value="finalized">Finalized</option>
              <option value="archived">Archived</option>
              <option value="deleted">Deleted</option>
              <option value="all">All visible</option>
            </select>
          </label>
          <label>
            Type
            <select data-list-filter-type>
              <option value="all" selected>All types</option>
              <option value="shopping">Shopping</option>
              <option value="procurement">Procurement</option>
              <option value="packing">Packing</option>
              <option value="supplies">Supplies</option>
              <option value="parts">Parts</option>
              <option value="checklist">Checklist</option>
              <option value="bill_of_materials">Bill of Materials</option>
            </select>
          </label>
          <label>
            Reusable
            <select data-list-filter-reusable>
              <option value="no" selected>Normal lists</option>
              <option value="yes">Reusable only</option>
              <option value="all">All</option>
            </select>
          </label>
          <label data-list-business-control>
            Client
            <select data-list-filter-client>
              <option value="all" selected>All clients</option>
            </select>
          </label>
          <label data-list-context-control>
            Project
            <select data-list-filter-project>
              <option value="all" selected>All projects</option>
            </select>
          </label>
          <label>
            Assigned
            <select data-list-filter-assignee>
              <option value="all" selected>All assignees</option>
            </select>
          </label>
          <label>
            Needed By
            <input type="date" data-list-filter-needed>
          </label>
          <label>
            Archived State
            <select data-list-filter-archive>
              <option value="current" selected>Current</option>
              <option value="archived">Archived</option>
              <option value="deleted">Deleted</option>
              <option value="all">All states</option>
            </select>
          </label>
          <label>
            Sort
            <select data-list-sort>
              <option value="updated_desc" selected>Updated</option>
              <option value="title_asc">Title</option>
              <option value="type_asc">Type</option>
              <option value="status_asc">Status</option>
              <option value="needed_asc">Needed Date</option>
              <option value="finalized_desc">Finalized Date</option>
            </select>
          </label>
        </form>
      </details>

      <section class="lists-workspace" aria-label="Lists workspace">
        <section class="lists-index-panel" aria-label="List index">
          <div class="lists-list-toolbar">
            <h2 data-lists-count>Lists</h2>
          </div>
          <div class="list-table-wrap">
            <table class="list-table lists-table">
              <thead>
                <tr>
                  <th>List</th>
                  <th>Status</th>
                  <th>Type</th>
                  <th>Needed</th>
                  <th>Items</th>
                </tr>
              </thead>
              <tbody data-lists-list></tbody>
            </table>
          </div>
        </section>

        <article class="lists-detail-panel" data-list-detail>
          <p class="lists-empty-state">Select a list.</p>
        </article>
      </section>
    </main>

    <dialog class="lists-dialog" data-list-dialog>
      <form method="dialog" class="lists-form" data-list-form>
        <div class="lists-dialog-heading">
          <h2 data-list-dialog-title>List</h2>
          <button type="button" data-list-dialog-close aria-label="Close">Close</button>
        </div>

        <label>
          Title
          <input type="text" data-list-title required>
        </label>

        <div class="lists-form-grid">
          <label>
            Type
            <select data-list-type>
              <option value="shopping">Shopping</option>
              <option value="procurement">Procurement</option>
              <option value="packing">Packing</option>
              <option value="supplies">Supplies</option>
              <option value="parts">Parts</option>
              <option value="checklist">Checklist</option>
              <option value="bill_of_materials">Bill of Materials</option>
            </select>
          </label>
          <label data-list-business-control>
            Client
            <select data-list-client></select>
          </label>
          <label data-list-context-control>
            Project
            <select data-list-project></select>
          </label>
        </div>

        <label>
          Description
          <textarea data-list-description rows="4"></textarea>
        </label>

        <p data-list-form-status role="status" aria-live="polite"></p>

        <div class="form-actions">
          <button type="button" data-list-cancel>Cancel</button>
          <button type="submit" data-list-save>Save List</button>
        </div>
      </form>
    </dialog>

    <script src="js/navigation.js"></script>
    <script src="js/shared/api-client.js"></script>
    <script src="js/shared/icons.js?v=1"></script>
    <script src="js/shared/client-project-options.js?v=1"></script>
    <script src="js/lists.js?v=2"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
