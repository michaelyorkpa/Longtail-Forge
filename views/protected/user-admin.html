<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Admin | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=5">
  </head>
  <body data-page-title="User Admin">
    <main class="user-admin-page">
      <h1>User Admin</h1>

      <form class="settings-form" data-user-admin-form>
        <fieldset class="settings-fieldset">
          <legend>Add User</legend>

          <label>
            Username
            <input type="text" data-new-user-username required autocomplete="off">
          </label>
        </fieldset>

        <button type="submit" data-create-user>Create User</button>
      </form>

      <section class="generated-password-panel" data-generated-password-panel hidden>
        <h2>Generated Password</h2>
        <div class="copy-field">
          <input type="text" data-generated-password readonly>
          <button type="button" data-copy-generated-password>Copy</button>
        </div>
      </section>

      <p data-user-admin-status role="status" aria-live="polite"></p>

      <div class="report-table-wrap">
        <table class="report-table">
          <thead>
            <tr>
              <th scope="col">Username</th>
              <th scope="col">Status</th>
              <th scope="col">Actions</th>
            </tr>
          </thead>
          <tbody data-user-list></tbody>
        </table>
      </div>

      <dialog data-edit-user-dialog>
        <form class="user-edit-form" data-edit-user-form>
          <h2>Edit User</h2>
          <input type="hidden" data-edit-user-id>

          <label>
            Username
            <input type="text" data-edit-user-username required autocomplete="off">
          </label>

          <fieldset class="settings-fieldset role-assignment-editor">
            <legend>Role Assignments</legend>

            <div class="role-assignment-stack">
              <label>
                Role
                <select data-role-assignment-role></select>
              </label>

              <label>
                Scope
                <select data-role-assignment-scope></select>
              </label>

              <button type="button" data-add-role-assignment>Add Role</button>
            </div>

            <button type="button" class="secondary-button" data-configure-draft-permissions>
              Configure Permissions
            </button>

            <ul class="role-assignment-list" data-role-assignment-list></ul>
          </fieldset>

          <div class="form-actions">
            <button type="button" data-cancel-edit-user>Cancel</button>
            <button type="button" data-reset-edit-user-password>Reset Password</button>
            <button type="submit" data-save-edit-user>Save User</button>
          </div>
        </form>
      </dialog>

      <dialog data-role-permissions-dialog>
        <form class="role-permissions-form" data-role-permissions-form>
          <h2>Assignment Permissions</h2>
          <p class="muted-text" data-role-permissions-summary></p>

          <div class="permission-matrix" data-permission-matrix></div>

          <div class="form-actions">
            <button type="button" data-cancel-role-permissions>Cancel</button>
            <button type="submit" data-save-role-permissions>Apply</button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/shared/modal.js"></script>
    <script src="js/shared/api-client.js"></script>
    <script src="js/user-admin.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
