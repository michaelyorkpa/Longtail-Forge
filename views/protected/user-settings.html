<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Settings | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=7">
  </head>
  <body data-page-title="User Settings">
    <main class="settings-page user-settings-page">
      <h1>User Settings</h1>

      <form class="settings-form" data-user-theme-form>
        <fieldset class="settings-fieldset">
          <legend>Appearance</legend>

          <label class="theme-mode-switch">
            <span>Light</span>
            <input type="checkbox" data-theme-mode-toggle>
            <span class="theme-switch-track" aria-hidden="true"></span>
            <span>Dark</span>
          </label>
        </fieldset>
      </form>

      <form class="settings-form" data-user-password-form>
        <fieldset class="settings-fieldset">
          <legend>Password</legend>

          <label>
            Current Password
            <input type="password" autocomplete="current-password" data-current-password required>
          </label>

          <label>
            New Password
            <input type="password" autocomplete="new-password" data-new-password required minlength="8">
          </label>

          <label>
            Confirm New Password
            <input type="password" autocomplete="new-password" data-confirm-password required minlength="8">
          </label>
        </fieldset>

        <button type="submit" data-save-password>Change Password</button>
      </form>

      <form class="settings-form" data-user-profile-form>
        <fieldset class="settings-fieldset">
          <legend>Profile</legend>

          <label>
            Email Address
            <input type="email" data-profile-username required autocomplete="email">
          </label>

          <label>
            Display Name
            <input type="text" data-profile-display-name required autocomplete="name">
          </label>

          <label>
            Alternate Email Address
            <input type="email" data-profile-alt-email autocomplete="email">
          </label>

          <label>
            Timezone
            <select data-profile-timezone required>
              <option value="America/New_York">America/New_York</option>
              <option value="America/Chicago">America/Chicago</option>
              <option value="America/Denver">America/Denver</option>
              <option value="America/Phoenix">America/Phoenix</option>
              <option value="America/Los_Angeles">America/Los_Angeles</option>
              <option value="America/Anchorage">America/Anchorage</option>
              <option value="Pacific/Honolulu">Pacific/Honolulu</option>
              <option value="UTC">UTC</option>
            </select>
          </label>
        </fieldset>

        <button type="submit" data-save-profile>Save Profile</button>
      </form>

      <form class="settings-form" data-workspace-create-form>
        <fieldset class="settings-fieldset">
          <legend>Workspaces</legend>

          <label>
            Workspace Type
            <select data-new-workspace-type required></select>
          </label>

          <label>
            Workspace Name
            <input type="text" data-new-workspace-name required autocomplete="organization">
          </label>

          <label class="inline-option">
            <input type="checkbox" data-new-workspace-time-tracking checked>
            Time Tracking
          </label>
        </fieldset>

        <button type="submit" data-create-workspace>Create Workspace</button>
      </form>

      <div class="settings-secondary-actions">
        <button type="button" data-open-workspace-removal>Remove Workspace</button>
      </div>

      <p data-user-settings-status role="status" aria-live="polite"></p>

      <dialog class="workspace-removal-dialog" data-workspace-removal-dialog>
        <form method="dialog" class="app-dialog-form">
          <h2>Remove Workspace</h2>
          <div class="workspace-removal-list" data-workspace-removal-list></div>
          <div class="form-actions">
            <button type="button" data-close-workspace-removal>Close</button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/shared/timezones.js"></script>
    <script src="js/user-settings.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
