<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projects | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=5">
  </head>
  <body data-page-title="Projects" data-client-project-page="projects">
    <main class="wide-page">
      <div class="page-heading">
        <h1>Projects</h1>
      </div>

      <div class="client-filters">
        <label>
          Client
          <select data-project-client-filter>
            <option value="All" selected>All clients</option>
          </select>
        </label>

        <label>
          Status
          <select data-client-status-filter>
            <option value="Active" selected>Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Completed">Completed</option>
            <option value="All">All</option>
          </select>
        </label>
      </div>

      <p data-client-project-status role="status" aria-live="polite"></p>
      <div class="client-filters" data-project-bulk-actions>
        <label>
          Bulk Status
          <select data-bulk-project-status>
            <option value="">No status change</option>
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Completed">Completed</option>
          </select>
        </label>

        <label>
          Bulk Client
          <select data-bulk-project-client>
            <option value="">No client change</option>
          </select>
        </label>

        <label>
          Bulk Billable
          <select data-bulk-project-billable>
            <option value="">No billing change</option>
            <option value="yes">Billable</option>
            <option value="no">Non-billable</option>
          </select>
        </label>

        <button type="button" data-apply-project-bulk>Apply to Selected</button>
      </div>
      <section class="client-list" data-client-list aria-label="Projects"></section>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/shared/modal.js"></script>
    <script src="js/shared/api-client.js"></script>
    <script src="js/clients-projects.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
