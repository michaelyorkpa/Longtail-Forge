<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workspace Settings | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=7">
  </head>
  <body data-page-title="Workspace Settings">
    <main class="settings-page workspace-settings-page">
      <h1>Workspace Settings</h1>

      <form class="settings-form" data-workspace-settings-form>
        <label>
          Workspace Name
          <input type="text" data-workspace-name-input required>
        </label>

        <label>
          Workspace Type
          <select data-workspace-type-input>
            <option value="business">Business</option>
            <option value="personal">Personal</option>
            <option value="family">Family</option>
          </select>
        </label>

        <div class="workspace-settings-grid">
          <div class="workspace-settings-column">
            <fieldset class="settings-fieldset">
              <legend>Modules</legend>
              <div data-module-settings></div>
            </fieldset>

            <fieldset class="settings-fieldset">
              <legend>Audit Log</legend>

              <label class="inline-option">
                <input type="checkbox" data-audit-logging-enabled>
                App Audit Logging
              </label>

              <label>
                Retention Period
                <select data-audit-retention-days>
                  <option value="7">7 days</option>
                  <option value="14">14 days</option>
                  <option value="30">30 days</option>
                  <option value="60">60 days</option>
                  <option value="90">90 days</option>
                  <option value="180">180 days</option>
                  <option value="365">1 year</option>
                </select>
              </label>
            </fieldset>

            <fieldset class="settings-fieldset task-reminder-settings">
              <legend>Task Reminder Defaults</legend>
              <div class="reminder-offset-grid">
                <label>
                  Timed Reminder 1 (hours before)
                  <input type="number" min="1" step="1" data-workspace-reminder-date-time-hours-1>
                </label>
                <label>
                  Timed Reminder 2 (hours before)
                  <input type="number" min="1" step="1" data-workspace-reminder-date-time-hours-2>
                </label>
                <label>
                  Date-Only Reminder 1 (days before)
                  <input type="number" min="1" step="1" data-workspace-reminder-date-only-days-1>
                </label>
                <label>
                  Date-Only Reminder 2 (days before)
                  <input type="number" min="1" step="1" data-workspace-reminder-date-only-days-2>
                </label>
              </div>
            </fieldset>
          </div>

          <div class="workspace-settings-column">
            <fieldset class="settings-fieldset">
              <legend>Fiscal Year</legend>

              <label>
                Start Month
                <select data-fiscal-year-start-month></select>
              </label>

              <label>
                Start Day
                <select data-fiscal-year-start-day></select>
              </label>
            </fieldset>

            <fieldset class="settings-fieldset" data-billing-settings-fieldset>
              <legend>Billing Settings</legend>

              <label data-business-billing-control>
                Default Billing Rate ($/hour)
                <input type="text" inputmode="decimal" data-default-billing-rate-input>
              </label>

              <label data-business-billing-control>
                Billing Period
                <select data-billing-period-type>
                  <option value="calendarMonth">Calendar month</option>
                  <option value="custom">Custom</option>
                </select>
              </label>

              <label data-business-billing-control>
                Start Day
                <select data-billing-period-start-day></select>
              </label>

              <label class="inline-option">
                <input type="checkbox" data-billing-rounding-enabled>
                Round?
              </label>

              <label>
                Rounding Increment
                <select data-billing-rounding-increment disabled>
                  <option value="nearestQuarterHour">Nearest quarter hour</option>
                  <option value="nearestHalfHour">Nearest half hour</option>
                  <option value="nearestHour">Nearest hour</option>
                </select>
              </label>
            </fieldset>
          </div>
        </div>

        <button type="submit" data-save-settings>Save Settings</button>
      </form>

      <div class="settings-secondary-actions">
        <button type="button" data-open-workspace-users>Workspace Users</button>
      </div>

      <p data-workspace-settings-status role="status" aria-live="polite"></p>

      <dialog class="workspace-users-dialog" data-workspace-users-dialog>
        <form method="dialog" class="app-dialog-form">
          <h2>Workspace Users</h2>
          <div class="workspace-users-list" data-workspace-users-list></div>
          <div class="form-actions">
            <button type="button" data-close-workspace-users>Close</button>
          </div>
        </form>
      </dialog>
    </main>

    <script src="js/navigation.js"></script>
    <script src="js/shared/api-client.js"></script>
    <script src="js/workspace-settings.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
