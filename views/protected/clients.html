<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clients | Longtail Forge</title>
    <script src="js/theme-init.js"></script>
    <link rel="stylesheet" href="css/longtail-forge.css?v=7">
  </head>
  <body data-page-title="Clients" data-client-project-page="clients">
    <main class="wide-page">
      <div class="page-heading">
        <h1>Clients</h1>
        <button type="button" data-add-client>Add Client</button>
      </div>

      <div class="client-filters">
        <label>
          Client Status
          <select data-client-status-filter>
            <option value="Active" selected>Active</option>
            <option value="Inactive">Inactive</option>
            <option value="All">All</option>
          </select>
        </label>
      </div>

      <p data-client-project-status role="status" aria-live="polite"></p>
      <section class="client-list" data-client-list aria-label="Clients"></section>

    </main>

    <script src="js/navigation.js"></script>
    <script src="js/shared/modal.js"></script>
    <script src="js/shared/api-client.js"></script>
    <script src="js/shared/page-controller.js"></script>
    <script src="js/shared/module-actions.js?v=1"></script>
    <script src="js/shared/icons.js?v=1"></script>
    <script src="js/shared/tags.js"></script>
    <script src="js/shared/view-builder.js?v=3"></script>
    <script src="js/clients-projects.js?v=11"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
