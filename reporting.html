<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reporting | Time Tracker</title>
    <link rel="stylesheet" href="styles/time-tracker.css">
  </head>
  <body data-page-title="Reporting">
    <header class="site-header">
      <nav class="site-nav" aria-label="Primary">
        <a class="site-brand" href="home.html" data-organization-name>Organization</a>
        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="primary-menu"
          aria-label="Toggle navigation"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="nav-links" id="primary-menu">
          <a href="home.html">Home</a>
          <details class="nav-menu">
            <summary>Time Keeping</summary>
            <div class="nav-menu-links">
              <a href="index.html">Time Tracker</a>
              <a href="manual-entry.html">Create Manual Entry</a>
              <a href="edit-entries.html">Edit Entries</a>
            </div>
          </details>
          <a href="reporting.html" aria-current="page">Reporting</a>
          <details class="nav-menu">
            <summary>Settings</summary>
            <div class="nav-menu-links">
              <a href="clients-projects.html">Projects &amp; Clients</a>
              <a href="app-settings.html">App Settings</a>
            </div>
          </details>
        </div>
      </nav>
    </header>

    <main class="reporting-page">
      <h1>Reporting</h1>

      <section class="report-filters" aria-label="Report filters">
        <label class="report-period-control">
          Billing Period
          <select data-report-period>
            <option value="current">Current billing period</option>
            <option value="last">Last Billing Period</option>
            <option value="custom">Custom</option>
          </select>
        </label>

        <div class="report-custom-dates" data-report-custom-dates>
          <label>
            Start Date
            <input type="date" data-report-start-date>
          </label>

          <label>
            End Date
            <input type="date" data-report-end-date>
          </label>
        </div>

        <label>
          Client
          <select data-report-client>
            <option value="">Select a client</option>
          </select>
        </label>

        <label>
          Projects
          <select data-report-projects multiple disabled></select>
        </label>
      </section>

      <p data-report-status role="status" aria-live="polite"></p>

      <div class="report-table-wrap" hidden data-report-table-wrap>
        <table class="report-table">
          <thead>
            <tr>
              <th scope="col">Project</th>
              <th scope="col">Billing Rate</th>
              <th scope="col">Total Time</th>
              <th scope="col">Billable Amount</th>
            </tr>
          </thead>
          <tbody data-report-table-body></tbody>
          <tfoot>
            <tr>
              <th scope="row" colspan="2">Totals</th>
              <td data-report-total-time></td>
              <td data-report-total-billable-amount></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </main>

    <script src="navigation.js"></script>
    <script src="reporting.js"></script>
  </body>
</html>
